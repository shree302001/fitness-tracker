// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// capacitor-health-connect uses Kotlin 1.8.20 which doesn't support JVM 21.
// Force JVM 17 target for all Kotlin compile tasks across subprojects.
subprojects {
    afterEvaluate {
        tasks.matching { it.name.contains('compileDebugKotlin') || it.name.contains('compileReleaseKotlin') }.configureEach {
            if (it.hasProperty('kotlinOptions')) {
                it.kotlinOptions.jvmTarget = "17"
            }
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
